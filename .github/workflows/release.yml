name: 🚀 Release

# Trigger: git tag -a v1.1.0 -m "- Feature X\n- Fix Y" && git push --tags
on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: read

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed to read tag annotation

      # ── 2. Extract version + release notes from annotated tag ──────────────
      - name: Extract metadata
        id: meta
        shell: pwsh
        run: |
          $tag     = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $notes   = git for-each-ref --format='%(contents)' "refs/tags/$tag"
          $notes   = ($notes -join "`n").Trim()
          if (-not $notes) { $notes = "Version $version" }

          "VERSION=$version"           | Out-File $env:GITHUB_OUTPUT -Append
          "NOTES<<__EOF__"             | Out-File $env:GITHUB_OUTPUT -Append
          $notes                       | Out-File $env:GITHUB_OUTPUT -Append
          "__EOF__"                    | Out-File $env:GITHUB_OUTPUT -Append

      # ── 3. Patch version in .csproj ────────────────────────────────────────
      - name: Patch csproj version
        shell: pwsh
        run: |
          $v    = "${{ steps.meta.outputs.VERSION }}"
          $file = "Projektsoftware/Projektsoftware.csproj"
          (Get-Content $file) `
            -replace '<Version>.*?</Version>',               "<Version>$v</Version>"          `
            -replace '<AssemblyVersion>.*?</AssemblyVersion>',"<AssemblyVersion>$v.0</AssemblyVersion>" `
            -replace '<FileVersion>.*?</FileVersion>',        "<FileVersion>$v.0</FileVersion>"         |
          Set-Content $file

      # ── 4. Setup .NET 10 ───────────────────────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # ── 5. Publish (self-contained, win-x64) ──────────────────────────────
      - name: Restore & Publish
        run: >
          dotnet publish Projektsoftware/Projektsoftware.csproj
          -c Release
          -r win-x64
          --self-contained true
          -o publish/

      # ── 6. Install Inno Setup ──────────────────────────────────────────────
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      # ── 7. Build installer ─────────────────────────────────────────────────
      - name: Build installer
        shell: pwsh
        run: |
          $v = "${{ steps.meta.outputs.VERSION }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$v" build/Setup.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # ── 8. Generate manifest.json (Webspace-URL) ──────────────────────────
      - name: Generate manifest.json
        shell: pwsh
        run: |
          $v     = "${{ steps.meta.outputs.VERSION }}"
          $base  = "${{ secrets.UPDATE_BASE_URL }}"
          $notes = @"
          ${{ steps.meta.outputs.NOTES }}
          "@

          $manifest = [ordered]@{
            version      = $v
            downloadUrl  = "$base/setup-$v.exe"
            releaseNotes = $notes.Trim()
          } | ConvertTo-Json
          Set-Content manifest.json $manifest -Encoding UTF8

      # ── 9. Dateien für Upload zusammenstellen ─────────────────────────────
      - name: Prepare upload directory
        shell: pwsh
        run: |
          $v = "${{ steps.meta.outputs.VERSION }}"
          New-Item -ItemType Directory -Force -Path upload
          Copy-Item "build/Output/setup-$v.exe" "upload/setup-$v.exe"
          Copy-Item "manifest.json"              "upload/manifest.json"

      # ── 10. Per FTP auf Webspace hochladen (Python ftplib) ─────────────────
      - name: Upload to Webspace (FTP)
        shell: python
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_PATH: ${{ secrets.FTP_PATH }}
          VERSION:  ${{ steps.meta.outputs.VERSION }}
        run: |
          import ftplib, os, re, ssl
          host  = os.environ['FTP_HOST']
          user  = os.environ['FTP_USER']
          pw    = os.environ['FTP_PASS']
          path  = os.environ['FTP_PATH']
          v     = os.environ['VERSION']
          ws    = os.environ['GITHUB_WORKSPACE']
          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE
          try:
            ftp = ftplib.FTP_TLS(host, context=ctx)
            ftp.login(user, pw)
            ftp.prot_p()
          except Exception as e:
            print(f'FTPS: {e} — plain FTP')
            ftp = ftplib.FTP(host)
            ftp.login(user, pw)
          ftp.set_pasv(True)
          print(f'[PWD nach Login] {ftp.sendcmd("PWD")}')
          print('[FTP Root Inhalt:]')
          ftp.dir()

          # FTP-Home ist moeglicherweise Home/Dev (chroot), Web-Root liegt eine Ebene hoeher
          ftp.cwd('/')
          pwd_root = ftp.sendcmd('PWD')
          ftp.cwd('..')
          pwd_parent = ftp.sendcmd('PWD')
          print(f'[cwd(..) Test] vorher: {pwd_root} | danach: {pwd_parent}')
          if pwd_parent != pwd_root:
            print('[OK: Elternverzeichnis erreichbar — navigiere von dort]')
            print('[Elternverzeichnis Inhalt:]')
            ftp.dir()
            # Bleibe hier — navigate() laeuft vom Subscription-Root
          else:
            print('[WARNUNG: FTP-Chroot aktiv — Elternverzeichnis gesperrt]')
            print('[LOESUNG: In Plesk FTP-Accounts das Home-Verzeichnis auf "/" aendern]')
            ftp.cwd('/')

          def navigate(ftp, target):
            for part in target.replace('\\', '/').strip('/').split('/'):
              if not part:
                continue
              try:
                ftp.mkd(part)
              except ftplib.error_perm:
                pass
              try:
                ftp.sendcmd(f'SITE CHMOD 755 {part}')
              except:
                pass
              ftp.cwd(part)

          navigate(ftp, path)
          print(f'[PWD Zielverzeichnis] {ftp.sendcmd("PWD")}')
          print('[Zielverzeichnis Inhalt vor Upload:]')
          ftp.dir()
          # test.html um nginx-Blockierung vs. falsches Verzeichnis zu unterscheiden
          test_html = os.path.join(ws, 'test.html')
          with open(test_html, 'w') as f:
            f.write('<html><body>OK</body></html>')
          for local, remote in [
            (os.path.join(ws, 'upload', 'manifest.json'),       'manifest.json'),
            (os.path.join(ws, 'upload', f'setup-{v}.exe'), f'setup-{v}.exe'),
            (test_html,                                          'test.html'),
          ]:
            print(f'Uploading {remote}')
            with open(local, 'rb') as f:
              ftp.storbinary(f'STOR {remote}', f)
            try:
              ftp.sendcmd(f'SITE CHMOD 644 {remote}')
            except:
              pass
          for name in ftp.nlst():
            if re.match(r'setup-.+\.exe$', name) and name != f'setup-{v}.exe':
              ftp.delete(name)
              print(f'Deleted old: {name}')
          ftp.quit()
          print('Upload abgeschlossen.')

      # ── 11. Manifest-URL verifizieren ──────────────────────────────────────
      - name: Verify manifest URL
        shell: pwsh
        env:
          UPDATE_BASE_URL: ${{ secrets.UPDATE_BASE_URL }}
        run: |
          $base = "https://af-software-engineering.de"
          $candidates = @(
            "/Dev/Projektsoftware/manifest.json",
            "/Dev/Projektsoftware/test.html",
            "/Projektsoftware/manifest.json",
            "/dev/projektsoftware/manifest.json",
            "/httpdocs/Dev/Projektsoftware/manifest.json",
            "/manifest.json"
          )
          Write-Host "=== HTTP-URL-Scan ==="
          Start-Sleep -Seconds 15
          foreach ($p in $candidates) {
            try {
              $r = Invoke-WebRequest "$base$p" -UseBasicParsing -ErrorAction Stop
              Write-Host "200  $p  <=== GEFUNDEN!"
            } catch {
              Write-Host "404  $p"
            }
          }
          Write-Host "=== Prüfe UPDATE_BASE_URL (Länge $(("$env:UPDATE_BASE_URL/manifest.json").Length) Zeichen) ==="
          try {
            $resp = Invoke-WebRequest "$env:UPDATE_BASE_URL/manifest.json" -UseBasicParsing -ErrorAction Stop
            Write-Host "200 OK — Inhalt:"
            Write-Host $resp.Content
          } catch {
            Write-Host "404 — UPDATE_BASE_URL stimmt nicht mit FTP-Pfad überein"
            exit 1
          }
