name: 🚀 Release

# Trigger: git tag -a v1.1.0 -m "- Feature X\n- Fix Y" && git push --tags
on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: read

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed to read tag annotation

      # ── 2. Extract version + release notes from annotated tag ──────────────
      - name: Extract metadata
        id: meta
        shell: pwsh
        run: |
          $tag     = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $notes   = git for-each-ref --format='%(contents)' "refs/tags/$tag"
          $notes   = ($notes -join "`n").Trim()
          if (-not $notes) { $notes = "Version $version" }

          "VERSION=$version"           | Out-File $env:GITHUB_OUTPUT -Append
          "NOTES<<__EOF__"             | Out-File $env:GITHUB_OUTPUT -Append
          $notes                       | Out-File $env:GITHUB_OUTPUT -Append
          "__EOF__"                    | Out-File $env:GITHUB_OUTPUT -Append

      # ── 3. Patch version in .csproj ────────────────────────────────────────
      - name: Patch csproj version
        shell: pwsh
        run: |
          $v    = "${{ steps.meta.outputs.VERSION }}"
          $file = "Projektsoftware/Projektsoftware.csproj"
          (Get-Content $file) `
            -replace '<Version>.*?</Version>',               "<Version>$v</Version>"          `
            -replace '<AssemblyVersion>.*?</AssemblyVersion>',"<AssemblyVersion>$v.0</AssemblyVersion>" `
            -replace '<FileVersion>.*?</FileVersion>',        "<FileVersion>$v.0</FileVersion>"         |
          Set-Content $file

      # ── 4. Setup .NET 10 ───────────────────────────────────────────────────
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # ── 5. Publish (self-contained, win-x64) ──────────────────────────────
      - name: Restore & Publish
        run: >
          dotnet publish Projektsoftware/Projektsoftware.csproj
          -c Release
          -r win-x64
          --self-contained true
          -o publish/

      # ── 6. Install Inno Setup + WinSCP ──────────────────────────────────────
      - name: Install Inno Setup + WinSCP
        run: choco install innosetup winscp --no-progress -y

      # ── 7. Build installer ─────────────────────────────────────────────────
      - name: Build installer
        shell: pwsh
        run: |
          $v = "${{ steps.meta.outputs.VERSION }}"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$v" build/Setup.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # ── 8. Generate manifest.json (Webspace-URL) ──────────────────────────
      - name: Generate manifest.json
        shell: pwsh
        run: |
          $v     = "${{ steps.meta.outputs.VERSION }}"
          $base  = "${{ secrets.UPDATE_BASE_URL }}"
          $notes = @"
          ${{ steps.meta.outputs.NOTES }}
          "@

          $manifest = [ordered]@{
            version      = $v
            downloadUrl  = "$base/setup-$v.exe"
            releaseNotes = $notes.Trim()
          } | ConvertTo-Json
          Set-Content manifest.json $manifest -Encoding UTF8

      # ── 9. Dateien für Upload zusammenstellen ─────────────────────────────
      - name: Prepare upload directory
        shell: pwsh
        run: |
          $v = "${{ steps.meta.outputs.VERSION }}"
          New-Item -ItemType Directory -Force -Path upload
          Copy-Item "build/Output/setup-$v.exe" "upload/setup-$v.exe"
          Copy-Item "manifest.json"              "upload/manifest.json"

      # ── 10. Per FTPS auf Webspace hochladen (WinSCP) ───────────────────────
      - name: Upload to Webspace (FTPS)
        shell: pwsh
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_PATH: ${{ secrets.FTP_PATH }}
        run: |
          $v          = "${{ steps.meta.outputs.VERSION }}"
          $ftpHost    = $env:FTP_HOST
          $ftpUser    = [Uri]::EscapeDataString($env:FTP_USER)
          $ftpPass    = [Uri]::EscapeDataString($env:FTP_PASS)
          $remotePath = $env:FTP_PATH
          $workspace  = $env:GITHUB_WORKSPACE
          $manifest   = Join-Path $workspace "upload\manifest.json"
          $installer  = Join-Path $workspace "upload\setup-${v}.exe"

          # Array-basiertes Script – kein here-string, keine führenden Leerzeichen
          $lines = @(
            "option batch abort",
            "option confirm off",
            "open ftp://${ftpUser}:${ftpPass}@${ftpHost} -explicit -certificate=`"*`"",
            "cd `"${remotePath}`"",
            "put `"${manifest}`"",
            "put `"${installer}`"",
            "close",
            "exit"
          )
          $script = $lines -join "`r`n"

          $tmpScript = Join-Path $env:TEMP "winscp_upload.txt"
          [System.IO.File]::WriteAllText($tmpScript, $script)

          Write-Host "=== WinSCP Script ==="
          $lines | ForEach-Object { Write-Host "  $_" }
          Write-Host "====================="

          # WinSCP-Pfad dynamisch ermitteln
          $winscp = @(
            "${env:ProgramFiles(x86)}\WinSCP\winscp.com",
            "${env:ProgramFiles}\WinSCP\winscp.com"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $winscp) {
            $winscp = (Get-Command "winscp.com" -ErrorAction SilentlyContinue)?.Source
          }
          if (-not $winscp) {
            Write-Error "winscp.com nicht gefunden!"
            Get-ChildItem "C:\Program Files*" -Filter "winscp.com" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
            exit 1
          }
          Write-Host "WinSCP: $winscp"

          & $winscp /ini=nul /script="$tmpScript" /log="winscp.log" /loglevel=2

          if ($LASTEXITCODE -ne 0) {
            Write-Host "=== WinSCP Log ==="
            Get-Content winscp.log -ErrorAction SilentlyContinue
            Write-Error "Upload fehlgeschlagen (exit $LASTEXITCODE)"
            exit 1
          }
          Write-Host "Upload abgeschlossen."
